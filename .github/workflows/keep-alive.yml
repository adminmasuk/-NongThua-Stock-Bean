name: Keep Render Alive

on:
  schedule:
    # ทุก 10 นาที
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping NongThua StockBot
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" https://nongthua-stock-bean.onrender.com
